<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lil Mechanic's: WrenchAtlas</title>
    <link rel="icon" href="assets/icon-32.png" sizes="32x32">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="popup-body">
    <main class="popup-shell">
      <div class="usa-stripe" aria-hidden="true"></div>
      <section class="popup-head">
        <button class="popup-mascot" id="popupWrenchieButton" type="button" aria-label="Ask Mr. Wrenchie what to do next">
          <img src="assets/mr-wrenchie.png" alt="">
        </button>
        <div>
          <h1><span class="family-prefix">Lil Mechanic's:</span><span class="product-name">Wrench<span>Atlas</span></span></h1>
          <p id="popupEdition">American Field Edition · v2.0</p>
        </div>
      </section>
      <button class="popup-wrenchie-guide" id="popupWrenchieGuide" type="button">
        <span>Mr. Wrenchie says</span>
        <strong id="popupWrenchieMessage">Start with the exact equipment identity, then stage the job.</strong>
      </button>
      <form class="popup-vin" id="popupVinForm">
        <label for="popupVinInput" id="popupIdentifierLabel">Vehicle identifier</label>
        <input id="popupVinInput" placeholder="Enter identifier" autocomplete="off" spellcheck="false">
        <button id="popupLookupButton" type="submit">Check</button>
      </form>
      <section class="popup-result" id="popupResult">
        <strong>Ready</strong>
        <span id="popupReadyText">Check an identifier or load the industry demo.</span>
      </section>
      <button class="primary-wide demo-wide" id="openIndustryDemo" type="button">Load industry demo</button>
      <button class="primary-wide" id="openWorkspace" type="button">Open workspace</button>
      <p class="popup-foot" id="popupFoot">Free American open source. No ads. Local saves.</p>
    </main>
    <script src="variant.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
